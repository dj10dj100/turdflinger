name: 🚽 Build & Deploy Turdflinger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.6"  # matches project.godot features — no .0 suffix for Godot stable tags

jobs:
  # ─────────────────────────────────────────────
  #  1. Export the game to HTML5 / Web
  # ─────────────────────────────────────────────
  export-web:
    name: Export for Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Web export templates
        run: |
          TEMPLATE_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mkdir -p "$TEMPLATE_DIR"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATE_DIR/"

      - name: Create build directory
        run: mkdir -p build/web

      - name: Export game (headless)
        run: godot --headless --export-release "Web" build/web/index.html

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: build/web/
          retention-days: 7

  # ─────────────────────────────────────────────
  #  2. Deploy to Vercel (main branch only)
  # ─────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    needs: export-web
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: build/web/

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --token=${{ secrets.VERCEL_TOKEN }} build/web/
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
